<body class="bg-gray-50">

        const INITIAL_STEPS = [ ... ];

        // 4. 메인 컴포넌트 작성
        function App() {
            // 작성하신 컴포넌트 로직 (useState, useEffect 등)을 그대로 넣으세요.
            return (
                <div>
                   {/* 기존 return 안의 JSX 내용 */}
                </div>
            );
        }

        // 5. React 18 방식으로 렌더링
        const root = ReactDom.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
